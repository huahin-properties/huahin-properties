<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; display:inline-block; width:{{ width }}; font-family:'Work Sans',sans-serif;">
  <sc-if value="{{ showLabel }}">
    <div style="font-size:11px; color:oklch(50% 0.02 60); margin-bottom:5px;">{{ labelText }}</div>
  </sc-if>
  <div onClick="{{ toggleOpen }}" style="display:flex; align-items:center; gap:8px; cursor:pointer; border:1px solid oklch(85% 0.01 70); border-radius:{{ btnRadius }}; padding:{{ btnPad }}; background:oklch(99% 0.005 80); white-space:nowrap; width:100%; box-sizing:border-box;">
    <div style="width:{{ flagW }}; height:{{ flagH }}; border-radius:2px; overflow:hidden; flex-shrink:0; background:{{ currentFlagBg }};"></div>
    <sc-if value="{{ showLabel }}">
      <span style="font-size:13px; color:oklch(25% 0.02 60);">{{ currentLabel }}</span>
      <span style="margin-left:auto; font-size:10px; color:oklch(50% 0.02 60);">▾</span>
    </sc-if>
  </div>
  <sc-if value="{{ open }}">
    <div onClick="{{ close }}" style="position:fixed; inset:0; z-index:90;"></div>
    <div style="position:absolute; top:calc(100% + 6px); {{ menuSide }}:0; min-width:180px; background:oklch(99% 0.005 80); border:1px solid oklch(88% 0.01 70); border-radius:6px; box-shadow:0 16px 40px -12px rgba(30,20,10,0.3); z-index:91; overflow:hidden;">
      <sc-for list="{{ options }}" as="opt" hint-placeholder-count="4">
        <div onClick="{{ opt.select }}" style="display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; background:{{ opt.bg }};">
          <div style="width:22px; height:15px; border-radius:2px; overflow:hidden; flex-shrink:0; background:{{ opt.flagBg }};"></div>
          <span style="font-size:13px; color:oklch(25% 0.02 60);">{{ opt.label }}</span>
        </div>
      </sc-for>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 220, &quot;height&quot;: 60}, &quot;lang&quot;: {&quot;editor&quot;: null, &quot;default&quot;: &quot;en&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;options&quot;: {&quot;editor&quot;: null, &quot;default&quot;: [{&quot;code&quot;:&quot;en&quot;,&quot;label&quot;:&quot;English&quot;},{&quot;code&quot;:&quot;th&quot;,&quot;label&quot;:&quot;ไทย&quot;},{&quot;code&quot;:&quot;ru&quot;,&quot;label&quot;:&quot;Русский&quot;},{&quot;code&quot;:&quot;zh&quot;,&quot;label&quot;:&quot;中文&quot;}], &quot;tsType&quot;: &quot;object&quot;}, &quot;onSelect&quot;: {&quot;editor&quot;: null, &quot;default&quot;: null, &quot;tsType&quot;: &quot;(code: string) =&gt; void&quot;}, &quot;fullWidth&quot;: {&quot;editor&quot;: null, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;}, &quot;compact&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;}, &quot;menuAlign&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;left&quot;, &quot;options&quot;: [&quot;left&quot;, &quot;right&quot;], &quot;tsType&quot;: &quot;string&quot;}, &quot;labelText&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Select language&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
const FLAG_BG = {
  en: "repeating-linear-gradient(180deg,#B22234 0 12.5%, #fff 12.5% 25%)",
  th: "linear-gradient(180deg,#A51931 20%,#F4F5F8 20% 35%,#2D2A4A 35% 65%,#F4F5F8 65% 80%,#A51931 80%)",
  ru: "linear-gradient(180deg,#fff 0 33%,#0039A6 33% 66%,#D52B1E 66% 100%)",
  zh: "#DE2910",
  de: "linear-gradient(180deg,#000 0 33%,#DD0000 33% 66%,#FFCE00 66% 100%)",
  no: "linear-gradient(180deg,#EF2B2D 0 40%,#fff 40% 50%,#002868 50% 60%,#fff 60% 70%,#EF2B2D 70% 100%)",
};

class Component extends DCLogic {
  state = { open: false };

  toggleOpen() { this.setState((s) => ({ open: !s.open })); }
  close() { this.setState({ open: false }); }
  choose(code) {
    if (this.props.onSelect) this.props.onSelect(code);
    this.setState({ open: false });
  }

  renderVals() {
    const opts = this.props.options || [];
    const lang = this.props.lang;
    const current = opts.find((o) => o.code === lang) || opts[0] || { code: "en", label: "English" };
    const options = opts.map((o) => ({
      code: o.code,
      label: o.label,
      flagBg: FLAG_BG[o.code] || "oklch(90% 0.01 70)",
      bg: o.code === lang ? "oklch(96% 0.015 75)" : "transparent",
      select: () => this.choose(o.code),
    }));
    const compact = !!this.props.compact;
    return {
      width: this.props.fullWidth ? "100%" : "auto",
      btnPad: compact ? "6px" : (this.props.fullWidth ? "11px 12px" : "6px 10px"),
      btnRadius: compact ? "100px" : "4px",
      flagW: compact ? "20px" : "22px",
      flagH: compact ? "14px" : "15px",
      showLabel: !compact,
      menuSide: this.props.menuAlign === "right" ? "right" : "left",
      labelText: this.props.labelText || "Select language",
      currentFlagBg: FLAG_BG[current.code] || "oklch(90% 0.01 70)",
      currentLabel: current.label,
      open: this.state.open,
      toggleOpen: () => this.toggleOpen(),
      close: () => this.close(),
      options,
    };
  }
}

</script>
</body>
</html>
