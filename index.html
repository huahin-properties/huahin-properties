<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>huahin.properties — Workspace Platform Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/app.css">
<style>
  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 60px;}
  .hero{background:linear-gradient(135deg, var(--maroon), var(--maroon-dark));color:#fff;border-radius:14px;padding:32px 28px;margin:16px 0 24px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:oklch(88% 0.1 80);color:oklch(35% 0.1 60);padding:3px 8px;border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="tag" data-i18n="alert.demo"></div>
  <div class="hero">
    <div style="font-family:'Playfair Display',serif;font-size:26px;margin-bottom:8px;" data-i18n="hero.title"></div>
    <div style="font-size:14px;opacity:0.9;max-width:600px;line-height:1.7;" data-i18n="hero.tag"></div>
    <div style="font-size:12.5px;margin-top:12px;opacity:0.85;">Demo Member: huahin.properties/@somchai</div>
  </div>

  <div style="font-family:'Playfair Display',serif;font-size:18px;margin:24px 0 12px;">12 Mission Steps</div>
  <div class="grid" id="steps"></div>
</div>
<script src="./assets/js/i18n.js"></script>
<script src="./assets/js/app.js"></script>
<script>
const steps = [
  {n:1,name:"Member Workspace Command Center",status:"🟢",link:"./workspace.html"},
  {n:2,name:"My Favorites",status:"🟢",link:"./favorites.html"},
  {n:3,name:"Customer Collection Builder",status:"🟢",link:"./collections.html"},
  {n:4,name:"Customer Space",status:"🟢",link:"./customer-space.html"},
  {n:5,name:"Mini-Site + @username Identity",status:"🟢",link:"./mini-site.html"},
  {n:6,name:"Workspace Economy / Resource Center",status:"🟢",link:"./resources.html"},
  {n:7,name:"Packages and Add-ons",status:"🟢",link:"./packages.html"},
  {n:8,name:"Mini-Site Customiser",status:"🟢",link:"./customiser.html"},
  {n:9,name:"Global Multi-Language System",status:"🟡",link:"./resources.html"},
  {n:10,name:"Advanced Favorites Filters",status:"🟢",link:"./resources.html"},
  {n:11,name:"Onboarding + Marketing",status:"🟢",link:"./onboarding.html"},
  {n:12,name:"Consolidation / QA / Docs",status:"🟡",link:"./mission-report.html"},
];
document.getElementById('steps').innerHTML = steps.map(s => `
  <div class="card"><div style="display:flex;justify-content:space-between;"><strong style="font-size:13px;">Step ${s.n}. ${s.name}</strong><span>${s.status}</span></div>
  <a href="${s.link}" style="font-size:12px;">Open →</a></div>`).join('');
</script>
</body></html>
