<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; gap:20px; font-family:'Work Sans',sans-serif;">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div style="font-size:15px; font-weight:600; color:oklch(20% 0.02 60);">{{ f.t.filters }}</div>
    <div onClick="{{ f.onClear }}" style="font-size:13px; color:oklch(48% 0.07 55); cursor:pointer;">{{ f.t.clear_filters }}</div>
  </div>

  <div>
    <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 60); margin-bottom:6px;">{{ f.t.keyword_label }}</div>
    <input value="{{ f.keyword }}" onChange="{{ f.onKeyword }}" placeholder="{{ f.t.keyword_placeholder }}" style="width:100%; box-sizing:border-box; border:1px solid oklch(85% 0.01 70); border-radius:4px; padding:10px 12px; font-size:14px; color:oklch(25% 0.02 60); background:oklch(99% 0.005 80); font-family:inherit;" />
  </div>

  <div>
    <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 60); margin-bottom:6px;">{{ f.t.status_label }}</div>
    <select value="{{ f.status }}" onChange="{{ f.onStatus }}" style="width:100%; border:1px solid oklch(85% 0.01 70); border-radius:4px; padding:10px 12px; font-size:14px; color:oklch(25% 0.02 60); background:oklch(99% 0.005 80); font-family:inherit;">
      <option value="">{{ f.t.any }}</option>
      <option value="sale">{{ f.t.buy }}</option>
      <option value="rent">{{ f.t.rent }}</option>
    </select>
  </div>

  <div>
    <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 60); margin-bottom:6px;">{{ f.t.location_label }}</div>
    <select value="{{ f.area }}" onChange="{{ f.onArea }}" style="width:100%; border:1px solid oklch(85% 0.01 70); border-radius:4px; padding:10px 12px; font-size:14px; color:oklch(25% 0.02 60); background:oklch(99% 0.005 80); font-family:inherit;">
      <option value="">{{ f.t.all_zones }}</option>
      <sc-for list="{{ f.areas }}" as="a" hint-placeholder-count="3">
        <option value="{{ a.id }}">{{ a.label }}</option>
      </sc-for>
    </select>
  </div>

  <div>
    <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 60); margin-bottom:6px;">{{ f.t.type_label }}</div>
    <select value="{{ f.type }}" onChange="{{ f.onType }}" style="width:100%; border:1px solid oklch(85% 0.01 70); border-radius:4px; padding:10px 12px; font-size:14px; color:oklch(25% 0.02 60); background:oklch(99% 0.005 80); font-family:inherit;">
      <option value="">{{ f.t.any_type }}</option>
      <sc-for list="{{ f.types }}" as="ty" hint-placeholder-count="5">
        <option value="{{ ty.id }}">{{ ty.label }}</option>
      </sc-for>
    </select>
  </div>

  <div style="display:flex; gap:12px;">
    <div style="flex:1;">
      <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 60); margin-bottom:6px;">{{ f.t.bedrooms_label }}</div>
      <select value="{{ f.bedroomsMin }}" onChange="{{ f.onBedrooms }}" style="width:100%; border:1px solid oklch(85% 0.01 70); border-radius:4px; padding:10px 12px; font-size:14px; color:oklch(25% 0.02 60); background:oklch(99% 0.005 80); font-family:inherit;">
        <option value="">{{ f.t.any }}</option>
        <option value="1">1+</option>
        <option value="2">2+</option>
        <option value="3">3+</option>
        <option value="4">4+</option>
        <option value="5">5+</option>
      </select>
    </div>
    <div style="flex:1;">
      <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 60); margin-bottom:6px;">{{ f.t.bathrooms_label }}</div>
      <select value="{{ f.bathroomsMin }}" onChange="{{ f.onBathrooms }}" style="width:100%; border:1px solid oklch(85% 0.01 70); border-radius:4px; padding:10px 12px; font-size:14px; color:oklch(25% 0.02 60); background:oklch(99% 0.005 80); font-family:inherit;">
        <option value="">{{ f.t.any }}</option>
        <option value="1">1+</option>
        <option value="2">2+</option>
        <option value="3">3+</option>
        <option value="4">4+</option>
      </select>
    </div>
  </div>

  <div>
    <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 60); margin-bottom:6px;">{{ f.t.budget_label }}</div>
    <select value="{{ f.priceMax }}" onChange="{{ f.onPriceMax }}" style="width:100%; border:1px solid oklch(85% 0.01 70); border-radius:4px; padding:10px 12px; font-size:14px; color:oklch(25% 0.02 60); background:oklch(99% 0.005 80); font-family:inherit;">
      <option value="">{{ f.t.any_price }}</option>
      <option value="5000000">฿5,000,000</option>
      <option value="10000000">฿10,000,000</option>
      <option value="20000000">฿20,000,000</option>
      <option value="50000000">฿50,000,000</option>
      <option value="100000">฿100,000 (rent)</option>
    </select>
  </div>

  <div>
    <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 60); margin-bottom:10px;">{{ f.t.features_label }}</div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <sc-for list="{{ f.features }}" as="ft" hint-placeholder-count="6">
        <label style="display:flex; align-items:center; gap:10px; font-size:14px; color:oklch(30% 0.02 60); cursor:pointer;">
          <input type="checkbox" checked="{{ ft.checked }}" onChange="{{ ft.onToggle }}" style="width:16px; height:16px; accent-color:oklch(50% 0.09 70);" />
          {{ ft.label }}
        </label>
      </sc-for>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 280, &quot;height&quot;: 600}, &quot;f&quot;: {&quot;editor&quot;: null, &quot;default&quot;: {}, &quot;tsType&quot;: &quot;object&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const f = this.props.f || {};
    const selected = f.selectedFeatures || [];
    const features = (f.features || []).map((ft) => ({
      id: ft.id,
      label: ft.label,
      checked: selected.includes(ft.id),
      onToggle: () => f.onToggleFeature && f.onToggleFeature(ft.id),
    }));
    return { f: { ...f, features } };
  }
}

</script>
</body>
</html>
